{% if site.feedback %}
<h5 class="feedback--title">Feedback</h5>
<p class="feedback--question">Was this page helpful?</p>
<button type="button" class="feedback--answer feedback--answer-yes">Yes</button>
<button type="button" class="feedback--answer feedback--answer-no">No</button>
<p class="feedback--response feedback--response-yes">
  Glad to hear it! Please <a href="{{ site.repo }}/issues/new">tell us how we can improve</a>.
</p>
<p class="feedback--response feedback--response-no">
  Sorry to hear that. Please <a href="{{ site.repo }}/issues/new">tell us how we can improve</a>.
</p>
<script>
(function () {
  var yes = document.querySelector('.feedback--answer-yes');
  var no  = document.querySelector('.feedback--answer-no');
  var yesR = document.querySelector('.feedback--response-yes');
  var noR  = document.querySelector('.feedback--response-no');
  function disable() { if (yes) yes.disabled = true; if (no) no.disabled = true; }
  if (yes) yes.addEventListener('click', function () { yesR.classList.add('feedback--response__visible'); disable(); });
  if (no)  no.addEventListener('click', function ()  { noR.classList.add('feedback--response__visible');  disable(); });
})();
</script>
{% endif %}
