<header class="site-header">
  <div class="site-header__inner">
    <button class="menu-toggle" aria-label="Toggle navigation">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>

    <a class="brand" href="{{ site.baseurl }}/">
      <img class="brand__logo" src="{{ site.baseurl }}/assets/img/mt_server_logo_small.png" alt="Modding Tools">
      <span class="brand__name">MODDING WIKI</span>
    </a>

    <nav class="nav" aria-label="Primary">
      <a href="{{ site.baseurl }}/docs/">Docs</a>
      <a href="{{ site.baseurl }}/news/">News</a>
      <a href="{{ site.baseurl }}/about/">About</a>
      {% for link in site.data.navigation %}{% if link.external_url %}
        <a href="{{ link.external_url }}" target="_blank" rel="noopener">{{ link.title }}</a>
      {% endif %}{% endfor %}
    </nav>

    <div class="header-spacer"></div>

    <div class="search-box">
      <input type="search" class="js-search" placeholder="Search this site…" aria-label="Search this site">
    </div>

    {% if site.repo %}
    <a class="gh-source" href="{{ site.repo }}" target="_blank" rel="noopener" title="View on GitHub">
      <span class="gh-source__icon">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      </span>
      <div class="gh-source__meta">
        <span class="gh-source__repo">{{ site.github_user }}/{{ site.github_repo }}</span>
        <ul class="gh-source__facts">
          <li id="gh-stars" class="gh-source__fact">Loading stars</li>
          <li id="gh-forks" class="gh-source__fact">Loading forks</li>
        </ul>
      </div>
    </a>
    {% endif %}
  </div>
</header>
