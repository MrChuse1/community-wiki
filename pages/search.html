---
layout: page
title: Search
sitemap: false
permalink: /search/
not_editable: true
excluded_in_search: true
show_title: false
---

<h1>Search</h1>

<div style="position:relative; max-width:600px;">
  <input class="js-search" type="search" name="q" id="search-input" placeholder="Search this site…" autofocus
    style="width:100%; height:44px; padding: 0 1rem 0 2.6rem; background: var(--bg-2); border:1px solid var(--border); border-radius: var(--radius-md); color: var(--text); font-size: 1rem; outline:none;">
  <svg style="position:absolute; left:0.85rem; top:14px;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#98a1ad" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
</div>

<p style="margin-top:1rem; color: var(--text-muted);">
  <span id="search-process">Loading</span> results
  <span id="search-query-container" style="display:none;"> for "<strong id="search-query"></strong>"</span>
</p>

<ul id="search-results"></ul>

<script>
window.data = {
{% assign added = false %}
{% for post in site.docs %}{% unless post.excluded_in_search %}{% if added %},{% endif %}
  "{{ post.url | slugify }}": {
    "id":    "{{ post.url | slugify }}",
    "title": "{{ post.title | xml_escape }}",
    "categories": "{{ post.categories | join: ', ' | xml_escape }}",
    "url":   " {{ post.url | xml_escape }}",
    "content": {{ post.content | strip_html | replace_regex: "[\s/\n]+", " " | strip | jsonify }}
  }
{% assign added = true %}{% endunless %}{% endfor %}
{% for post in site.posts %}{% unless post.excluded_in_search %}{% if added %},{% endif %}
  "{{ post.url | slugify }}": {
    "id":    "{{ post.url | slugify }}",
    "title": "{{ post.title | xml_escape }}",
    "categories": "{{ post.categories | join: ', ' | xml_escape }}",
    "url":   " {{ post.url | xml_escape }}",
    "content": {{ post.content | strip_html | replace_regex: "[\s/\n]+", " " | strip | jsonify }}
  }
{% assign added = true %}{% endunless %}{% endfor %}
{% for post in site.pages %}{% unless post.excluded_in_search %}{% if added %},{% endif %}
  "{{ post.url | slugify }}": {
    "id":    "{{ post.url | slugify }}",
    "title": "{{ post.title | xml_escape }}",
    "categories": "{{ post.categories | join: ', ' | xml_escape }}",
    "url":   " {{ post.url | xml_escape }}",
    "content": {{ post.content | strip_html | replace_regex: "[\s/\n]+", " " | strip | jsonify }}
  }
{% assign added = true %}{% endunless %}{% endfor %}
};
</script>
<script src="{{ site.baseurl }}/assets/js/lunr.min.js"></script>
<script src="{{ site.baseurl }}/assets/js/search.js"></script>
